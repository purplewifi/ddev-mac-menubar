name: Build and Release

# Required GitHub Secrets:
#   BUILD_CERTIFICATE_BASE64  - Developer ID Application cert (.p12) base64-encoded
#                               Export from Keychain Access, then: base64 -i cert.p12 | pbcopy
#   P12_PASSWORD              - Password you set when exporting the .p12
#   KEYCHAIN_PASSWORD         - Any strong random string (used for the temp CI keychain)
#   APPLE_ID                  - Your Apple ID email (for notarization)
#   APPLE_ID_PASSWORD         - App-specific password from appleid.apple.com (not your main password)
#   SPARKLE_PRIVATE_KEY       - Ed25519 private key from running Sparkle's generate_keys tool

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build archive
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          xcodebuild archive \
            -project ddev-menubar.xcodeproj \
            -scheme ddev-menubar \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ddev-menubar.xcarchive" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=K6RX8VV4R4 \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION"

      - name: Export .app
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          IDENTITY_NAME=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep "Developer ID Application" | head -1 \
            | sed -E 's/.*"(Developer ID Application[^"]+)".*/\1/')
          echo "Export signing identity: $IDENTITY_NAME"

          python3 << EOF
          import plistlib
          plistlib.dump({
              "method": "developer-id",
              "teamID": "K6RX8VV4R4",
              "signingStyle": "manual",
              "signingCertificate": "$IDENTITY_NAME",
          }, open("$RUNNER_TEMP/ExportOptions.plist", "wb"))
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ddev-menubar.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Create DMG
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          ditto "$RUNNER_TEMP/export/ddev-menubar.app" "$STAGING/ddev-menubar.app"
          ln -s /Applications "$STAGING/Applications"

          xattr -cr "$STAGING/ddev-menubar.app"
          chmod +x scripts/sign-app-for-release.sh
          scripts/sign-app-for-release.sh \
            "$STAGING/ddev-menubar.app" \
            "$KEYCHAIN"

          # Use hdiutil instead of create-dmg: create-dmg runs Finder AppleScript
          # that adds metadata to the app bundle, invalidating signatures at notarization.
          hdiutil create \
            -volname "ddev-menubar ${{ github.ref_name }}" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$RUNNER_TEMP/ddev-menubar-${{ github.ref_name }}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          SUBMISSION=$(xcrun notarytool submit "$RUNNER_TEMP/ddev-menubar-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id K6RX8VV4R4 \
            --wait \
            --output-format json)

          echo "$SUBMISSION"
          STATUS=$(echo "$SUBMISSION" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          ID=$(echo "$SUBMISSION" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id K6RX8VV4R4
            exit 1
          fi

          xcrun stapler staple "$RUNNER_TEMP/ddev-menubar-${{ github.ref_name }}.dmg"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "$RUNNER_TEMP/ddev-menubar-${{ github.ref_name }}.dmg"

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_VERSION=2.6.4
          mkdir -p "$RUNNER_TEMP/sparkle"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP/sparkle"

          echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"

          mkdir -p "$RUNNER_TEMP/appcast-input"
          cp "$RUNNER_TEMP/ddev-menubar-${{ github.ref_name }}.dmg" "$RUNNER_TEMP/appcast-input/"

          "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --download-url-prefix "https://github.com/purplewifi/ddev-mac-menubar/releases/download/${{ github.ref_name }}/" \
            --link "https://github.com/purplewifi/ddev-mac-menubar" \
            "$RUNNER_TEMP/appcast-input/"

          cp "$RUNNER_TEMP/appcast-input/appcast.xml" appcast.xml

      - name: Commit appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Update appcast for ${{ github.ref_name }}"
          git push origin HEAD:main
